<title>Vehicle Counter — Mining Site</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #3fb950;
    box-shadow: 0 0 7px #3fb950;
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
  #clock {
    font-size: 0.85rem;
    color: #8b949e;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .btn-add-cam {
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-cam:hover { background: #2ea043; }

  main {
    flex: 1;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
    gap: 16px;
    align-content: start;
  }
  #empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #8b949e;
    font-size: 0.95rem;
  }
  #empty-state strong { color: #e6edf3; }

  .cam-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
  }
  .cam-card:hover { border-color: #58a6ff; }

  .cam-feed-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0d1117;
    overflow: hidden;
  }
  .cam-viewport {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transform-origin: 0 0;
  }
  .cam-feed {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .cam-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .cam-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    object-fit: contain;
  }
  .cam-sel {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .cam-sel.active { background: rgba(255,255,255,0.06); }
  .cam-sel .sel-rect {
    position: absolute;
    border: 2px dashed #58a6ff;
    background: rgba(88,166,255,0.12);
    pointer-events: none;
  }

  .fs-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fs-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
  }
  .fs-content {
    position: relative;
    width: 95vw;
    height: 95vh;
    display: flex;
    flex-direction: column;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }
  .fs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .fs-label {
    font-size: 1rem;
    font-weight: 600;
  }
  .fs-body {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .fs-body .cam-overlay {
    width: 100%;
    height: 100%;
  }
  .fs-body .cam-video,
  .fs-body .cam-feed {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .cam-feed-wrap::before {
    content: "Connecting\u2026";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8b949e;
    font-size: 0.85rem;
    pointer-events: none;
  }
  .cam-feed-wrap.has-feed::before { content: none; }


  .cam-info {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid #30363d;
  }
  .cam-label {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .cam-counts {
    display: flex;
    gap: 20px;
  }
  .count-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: #8b949e;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ht  { background: #00e5ff; }
  .dot-ov  { background: #ff9800; }
  .count-num {
    font-weight: 700;
    font-size: 1rem;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
  }
  .num-ht  { color: #00e5ff; }
  .num-ov  { color: #ff9800; }

  .cam-actions {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .cam-btn {
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    border: 1px solid #30363d;
    color: #8b949e;
  }
  .cam-btn:hover { color: #e6edf3; border-color: #8b949e; }
  .cam-btn.flash { color: #3fb950; border-color: #3fb950; }
  .btn-stop  { border-color: #f8514950; color: #f85149; }
  .btn-stop:hover  { background: #f8514915; border-color: #f85149; }
  .btn-start { border-color: #3fb95060; color: #3fb950; }
  .btn-start:hover { background: #3fb95015; border-color: #3fb950; }
  .btn-delete { border-color: #f8514950; color: #f85149; }
  .btn-delete:hover { background: #f8514915; border-color: #f85149; }

  footer {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .total-tag {
    font-size: 0.72rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .total-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .total-num {
    font-size: 1.6rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .total-ht  { color: #00e5ff; }
  .total-ov  { color: #ff9800; }
  .total-name {
    font-size: 0.75rem;
    color: #8b949e;
    margin-top: 2px;
  }
  .divider {
    width: 1px;
    height: 36px;
    background: #30363d;
    flex-shrink: 0;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 28px;
    width: 440px;
    max-width: 94vw;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal h2 {
    font-size: 1.05rem;
    font-weight: 700;
  }
  .modal label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .modal input, .modal select {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    color: #e6edf3;
    font-size: 0.9rem;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus, .modal select:focus { border-color: #58a6ff; }
  .modal .field { display: flex; flex-direction: column; gap: 5px; }
  .modal .row { display: flex; gap: 12px; }
  .modal .row .field { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .modal-actions button {
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: #21262d; color: #e6edf3; }
  .btn-cancel:hover { background: #30363d; }
  .btn-save   { background: #238636; color: #fff; }
  .btn-save:hover   { background: #2ea043; }
</style>

<header>
  <div class="logo">
    <div class="live-dot"></div>
    Mining Site Vehicle Counter
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="btn-add-cam" onclick="showAddModal()">+ Add Camera</button>
    <div id="clock">--:--:--</div>
  </div>
</header>

<main id="cam-grid">
  <div id="empty-state">
    <strong>No cameras configured.</strong><br>
    Click <strong>+ Add Camera</strong> to add your first camera.
  </div>
</main>

<footer id="footer-totals">
  <span class="total-tag">All Cameras Total</span>
</footer>

<!-- ── Add Camera Modal ── -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add Camera</h2>

    <div class="field">
      <label>Source Type</label>
      <select id="cam-source">
        <option value="usb">USB Camera (server)</option>
        <option value="rtsp">RTSP Stream</option>
        <option value="file">Video File</option>
        <option value="browser">Browser Camera (this device)</option>
      </select>
    </div>

    <div class="field" id="url-field">
      <label id="url-label">Camera Index</label>
      <input id="cam-url" type="text" value="0" placeholder="0">
    </div>

    <div class="field" id="facing-field" style="display:none">
      <label>Device Camera</label>
      <div style="display:flex;gap:8px">
        <select id="cam-devices" style="flex:1">
          <option value="">(click Detect to scan)</option>
        </select>
        <button class="cam-btn" onclick="detectCameras()" type="button"
                style="white-space:nowrap;padding:8px 12px;border:1px solid #58a6ff;color:#58a6ff;background:transparent;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:600">Detect</button>
      </div>
    </div>

    <div class="field">
      <label>Label</label>
      <input id="cam-label" type="text" placeholder="Gate A">
    </div>

    <div class="row">
      <div class="field">
        <label>Line Position</label>
        <input id="cam-linex" type="number" min="0" max="1" step="0.05" value="0.5">
      </div>
      <div class="field" id="loop-field">
        <label>Loop</label>
        <select id="cam-loop">
          <option value="true">Yes</option>
          <option value="false" selected>No</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveCamera()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="line-modal">
  <div class="modal">
    <h2>Line Settings</h2>
    <label>
      <span class="label-text">Position</span>
      <input type="range" id="line-pos" min="0" max="1" step="0.01" value="0.5">
      <span id="line-pos-val">50%</span>
    </label>
    <label>
      <span class="label-text">Orientation</span>
      <select id="line-orient">
        <option value="vertical">Vertical</option>
        <option value="horizontal">Horizontal</option>
      </select>
    </label>
    <label>
      <span class="label-text">Direction</span>
      <select id="line-dir">
        <option value="forward">Left → Right</option>
        <option value="backward">Right → Left</option>
      </select>
    </label>
    <div class="modal-actions">
      <button class="cam-btn" onclick="closeLineModal()">Cancel</button>
      <button class="cam-btn btn-save" onclick="saveLineSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── Live clock ──
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB');
    setTimeout(tick, 1000);
  })();

  // ── Color palette ──
  const CLASS_NAMES = {0: 'haul_truck', 1: 'other_vehicles'};
  const CLASS_COLORS = {
    haul_truck:     { dot: '#00e5ff', text: '#00e5ff' },
    other_vehicles: { dot: '#ff9800', text: '#ff9800' },
  };
  const DEFAULT_COLOR = { dot: '#8b949e', text: '#e6edf3' };

  function fmtLabel(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // ── localStorage persistence ──
  const STORAGE_KEY = 'vehicle-counter-cameras';

  function loadConfig() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveConfig(cams) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cams));
  }

  // ── Modal (Add / Edit) ──
  let _editingIndex = -1;

  function showAddModal(index) {
    _editingIndex = index !== undefined ? index : -1;
    const modalTitle = document.querySelector('#add-modal .modal h2');
    const saveBtn = document.querySelector('#add-modal .btn-save');
    const isEdit = _editingIndex >= 0;

    if (isEdit) {
      const cams = loadConfig();
      const cam = cams[_editingIndex];
      if (!cam) return;
      modalTitle.textContent = 'Edit Camera';
      saveBtn.textContent = 'Update';
      document.getElementById('cam-source').value = cam.source || 'file';
      document.getElementById('cam-url').value = cam.url || '';
      document.getElementById('cam-label').value = cam.label || '';
      document.getElementById('cam-linex').value = cam.line_x ?? 0.5;
      document.getElementById('cam-loop').value = cam.loop ? 'true' : 'false';
      updateUrlField();
      // If browser camera, detect devices and select the saved one
      if (cam.source === 'browser') {
        detectCameras().then(() => {
          const sel = document.getElementById('cam-devices');
          for (const opt of sel.options) {
            if (opt.value === cam.url) { opt.selected = true; break; }
          }
        });
      }
    } else {
      modalTitle.textContent = 'Add Camera';
      saveBtn.textContent = 'Save';
      document.getElementById('cam-source').value = 'usb';
      document.getElementById('cam-url').value = '0';
      document.getElementById('cam-label').value = '';
      document.getElementById('cam-linex').value = '0.5';
      document.getElementById('cam-loop').value = 'false';
      document.getElementById('cam-devices').innerHTML = '<option value="">(click Detect to scan)</option>';
      updateUrlField();
    }
    document.getElementById('add-modal').classList.add('open');
  }

  function hideAddModal() {
    document.getElementById('add-modal').classList.remove('open');
    _editingIndex = -1;
  }

  function updateUrlField() {
    const src = document.getElementById('cam-source').value;
    const label = document.getElementById('url-label');
    const input = document.getElementById('cam-url');
    const loopF = document.getElementById('loop-field');
    const facingF = document.getElementById('facing-field');
    if (src === 'browser') {
      document.getElementById('url-field').style.display = 'none';
      facingF.style.display = '';
      loopF.style.display = 'none';
    } else {
      document.getElementById('url-field').style.display = '';
      facingF.style.display = 'none';
      if (src === 'usb') {
        label.textContent = 'Camera Index';
        input.placeholder = '0';
        input.value = '0';
        loopF.style.display = 'none';
      } else if (src === 'rtsp') {
        label.textContent = 'RTSP URL';
        input.placeholder = 'rtsp://username:password@192.168.1.50:554/stream';
        input.value = '';
        loopF.style.display = 'none';
      } else {
        label.textContent = 'File Path';
        input.placeholder = 'videos/gate_a.mp4';
        input.value = '';
        loopF.style.display = '';
      }
    }
  }
  document.getElementById('cam-source').addEventListener('change', updateUrlField);

  function saveCamera() {
    const source = document.getElementById('cam-source').value;
    const label = document.getElementById('cam-label').value.trim() || 'Camera';
    const line_x = parseFloat(document.getElementById('cam-linex').value) || 0.5;
    const loop = document.getElementById('cam-loop').value === 'true';

    let url, facingMode;
    if (source === 'browser') {
      const select = document.getElementById('cam-devices');
      const deviceId = select.value;
      if (!deviceId) return alert('Click Detect and select a camera first');
      url = deviceId;
      facingMode = '';
    } else {
      url = document.getElementById('cam-url').value.trim();
      if (!url) return alert('URL / Index is required');
    }

    const cams = loadConfig();
    const camObj = { url, label, line_x, loop, source, facingMode };

    if (_editingIndex >= 0 && _editingIndex < cams.length) {
      // Preserve existing line_x on source change
      if (cams[_editingIndex].source !== source) {
        camObj.facingMode = '';
      }
      cams[_editingIndex] = camObj;
    } else {
      cams.push(camObj);
    }
    saveConfig(cams);
    hideAddModal();
    syncAndRender();
  }

  function editCamera(index) {
    showAddModal(index);
  }

  // ── Delete camera ──
  function deleteCamera(index) {
    if (!confirm('Remove this camera?')) return;
    const cams = loadConfig();
    cams.splice(index, 1);
    saveConfig(cams);
    syncAndRender();
  }

  // ── Sync with server + render ──
  async function syncAndRender() {
    let cams = loadConfig();

    // First visit: pull server's current camera list as default
    if (cams.length === 0) {
      try {
        const res = await fetch('/cameras/list');
        const data = await res.json();
        if (data.cameras && data.cameras.length > 0) {
          cams = data.cameras;
          saveConfig(cams);
        }
      } catch (_) {}
    }

    try {
      const res = await fetch('/cameras/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cams),
      });
      if (!res.ok) throw new Error('sync failed');
    } catch (e) {
      console.error('Sync error:', e);
    }
    renderCameras();
  }

  function renderCameras() {
    // Stop all active feeds BEFORE destroying DOM elements
    for (const id of Object.keys(canvasFeedControllers)) stopCanvasFeed(id);
    for (const id of Object.keys(annotationOverlays)) stopAnnotationOverlay(id);
    for (const id of Object.keys(browserStreams)) stopBrowserCam(id);

    const cams = loadConfig();
    const grid = document.getElementById('cam-grid');
    const emptyState = document.getElementById('empty-state');

    if (cams.length === 0) {
      grid.innerHTML = `<div id="empty-state">
        <strong>No cameras configured.</strong><br>
        Click <strong>+ Add Camera</strong> to add your first camera.
      </div>`;
      // Reset footer
      document.getElementById('footer-totals').innerHTML =
        '<span class="total-tag">All Cameras Total</span>';
      return;
    }

    let html = '';
    for (let i = 0; i < cams.length; i++) {
      const cam = cams[i];
      const sourceLabel = { usb: 'USB', rtsp: 'RTSP', file: 'File', browser: 'Browser' }[cam.source] || 'File';
      if (cam.source === 'browser') {
        html += `<div class="cam-card">
        <div class="cam-feed-wrap" id="wrap-${i}">
          <div class="cam-viewport" id="viewport-${i}">
            <video class="cam-video" id="video-${i}" autoplay playsinline muted></video>
            <canvas class="cam-overlay" id="overlay-${i}"></canvas>
            <div class="cam-sel" id="sel-${i}"></div>
          </div>
        </div>
        <div class="cam-info">
          <span class="cam-label">${escHtml(cam.label)} <span style="font-size:0.7rem;color:#8b949e;font-weight:400">(Browser)</span></span>
          <div class="cam-counts" id="counts-${i}"></div>
          <div class="cam-actions">
            <button class="cam-btn btn-start" id="toggle-${i}"
                    onclick="toggleCam(${i}, this)">Start</button>
            <button class="cam-btn" onclick="resetCam(${i}, this)">Reset</button>
            <button class="cam-btn" onclick="editCamera(${i})">Edit</button>
            <button class="cam-btn btn-delete" onclick="deleteCamera(${i})">Delete</button>
            <button class="cam-btn" onclick="zoomReset(${i})" title="Reset Zoom">⟲</button>
            <button class="cam-btn" onclick="fullscreenCam(${i})" title="Fullscreen">⛶</button>
            <button class="cam-btn" onclick="showLineModal(${i})" title="Line Settings">━</button>
          </div>
        </div>
      </div>`;
      } else {
        html += `<div class="cam-card">
        <div class="cam-feed-wrap" id="wrap-${i}">
          <div class="cam-viewport" id="viewport-${i}">
            <canvas class="cam-feed" id="feed-${i}"></canvas>
            <canvas class="cam-overlay" id="overlay-${i}"></canvas>
            <div class="cam-sel" id="sel-${i}"></div>
          </div>
        </div>
        <div class="cam-info">
          <span class="cam-label">${escHtml(cam.label)} <span style="font-size:0.7rem;color:#8b949e;font-weight:400">(${sourceLabel})</span></span>
          <div class="cam-counts" id="counts-${i}"></div>
          <div class="cam-actions">
            <button class="cam-btn btn-start" id="toggle-${i}"
                    onclick="toggleCam(${i}, this)">Start</button>
            <button class="cam-btn" onclick="resetCam(${i}, this)">Reset</button>
            <button class="cam-btn" onclick="editCamera(${i})">Edit</button>
            <button class="cam-btn btn-delete" onclick="deleteCamera(${i})">Delete</button>
            <button class="cam-btn" onclick="zoomReset(${i})" title="Reset Zoom">⟲</button>
            <button class="cam-btn" onclick="fullscreenCam(${i})" title="Fullscreen">⛶</button>
            <button class="cam-btn" onclick="showLineModal(${i})" title="Line Settings">━</button>
          </div>
        </div>
      </div>`;
      }
    }
    grid.innerHTML = html;
    // Auto-start canvas feeds for non-browser cameras
    for (let i = 0; i < cams.length; i++) {
      if (cams[i].source !== 'browser') {
        startCanvasFeed(i);
      }
    }
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function feedLoaded(id) {
    const wrap = document.getElementById(`wrap-${id}`);
    if (wrap) wrap.classList.add('has-feed');
  }

  // ── Canvas feed (double-buffered, no flicker) ──

  const canvasFeedControllers = {};

  function startCanvasFeed(id) {
    const canvas = document.getElementById(`feed-${id}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let stopped = false;
    let pollTimer = null;

    async function poll() {
      if (stopped) return;
      try {
        const res = await fetch(`/frame/${id}`);
        if (res.status !== 200) {
          pollTimer = setTimeout(poll, 300);
          return;
        }
        const blob = await res.blob();
        const img = new Image();
        img.onload = () => {
          if (stopped) { URL.revokeObjectURL(img.src); return; }
          if (canvas.width !== img.width || canvas.height !== img.height) {
            canvas.width = img.width;
            canvas.height = img.height;
            // Sync overlay canvas dimensions
            const ov = document.getElementById(`overlay-${id}`);
            if (ov) { ov.width = img.width; ov.height = img.height; }
          }
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(img.src);
          feedLoaded(id);
          // Draw count line on overlay from config
          const ov = document.getElementById(`overlay-${id}`);
          if (ov && ov.width && ov.height) {
            const cams = loadConfig();
            const cam = cams[id];
            const pv = typeof _linePreview !== 'undefined' && _linePreview[id];
            if (pv) drawLineOnOverlay(id, pv.pos, pv.orient || 'vertical');
            else if (cam) drawLineOnOverlay(id, cam.line_pos ?? cam.line_x ?? 0.5, cam.line_orientation);
          }
          pollTimer = setTimeout(poll, 8); // ~120 FPS display
        };
        img.onerror = () => {
          URL.revokeObjectURL(img.src);
          pollTimer = setTimeout(poll, 300);
        };
        img.src = URL.createObjectURL(blob);
      } catch (e) {
        pollTimer = setTimeout(poll, 500);
      }
    }

    poll();
    canvasFeedControllers[id] = () => {
      stopped = true;
      if (pollTimer) clearTimeout(pollTimer);
    };
  }

  function stopCanvasFeed(id) {
    if (canvasFeedControllers[id]) {
      canvasFeedControllers[id]();
      delete canvasFeedControllers[id];
    }
    delete _dragLineXFrac[id];
    if (typeof _linePreview !== 'undefined') delete _linePreview[id];
    const wrap = document.getElementById(`wrap-${id}`);
    if (wrap) wrap.classList.remove('has-feed');
  }

  // ── Annotation overlay (for browser cameras: video + transparent overlay) ──

  const annotationOverlays = {};

  function startAnnotationOverlay(id) {
    const overlay = document.getElementById(`overlay-${id}`);
    const video = document.getElementById(`video-${id}`);
    if (!overlay || !video) return;
    let stopped = false;
    let timer = null;

    async function poll() {
      if (stopped) return;
      try {
        const res = await fetch(`/annotations/${id}`);
        const data = await res.json();

        const vw = video.videoWidth, vh = video.videoHeight;
        if (vw && vh && (overlay.width !== vw || overlay.height !== vh)) {
          overlay.width = vw;
          overlay.height = vh;
        }

        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        const pv = typeof _linePreview !== 'undefined' && _linePreview[id];
        const pos = pv ? pv.pos : (data.line_pos ?? data.line_x ?? 0.5);
        const orient = pv ? pv.orient : (data.line_orientation || 'vertical');
        const lp = pos * (orient === 'horizontal' ? overlay.height : overlay.width);
        ctx.beginPath();
        if (orient === 'horizontal') {
          ctx.moveTo(0, lp);
          ctx.lineTo(overlay.width, lp);
        } else {
          ctx.moveTo(lp, 0);
          ctx.lineTo(lp, overlay.height);
        }
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(orient === 'horizontal' ? overlay.width / 2 : lp,
                orient === 'horizontal' ? lp : overlay.height / 2, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#00ffff';
        ctx.fill();
        ctx.strokeStyle = '#0d1117';
        ctx.lineWidth = 2;
        ctx.stroke();

        for (const box of data.boxes) {
          const name = CLASS_NAMES[box.class] || 'unknown';
          const color = CLASS_COLORS[name]?.dot || '#ffff00';
          const label = name.replace(/_/g, ' ') + ' ' + box.id;

          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.strokeRect(box.x1, box.y1, box.x2 - box.x1, box.y2 - box.y1);

          ctx.font = 'bold 13px sans-serif';
          const tw = ctx.measureText(label).width;
          const lh = 18;
          ctx.fillStyle = color;
          ctx.fillRect(box.x1, box.y1 - lh, tw + 6, lh);
          ctx.fillStyle = '#000';
          ctx.fillText(label, box.x1 + 3, box.y1 - 4);
        }

        timer = setTimeout(poll, 200); // 5 FPS overlay refresh
      } catch (e) {
        timer = setTimeout(poll, 500);
      }
    }

    poll();
    annotationOverlays[id] = () => { stopped = true; if (timer) clearTimeout(timer); };
  }

  function stopAnnotationOverlay(id) {
    if (annotationOverlays[id]) {
      annotationOverlays[id]();
      delete annotationOverlays[id];
    }
    delete _dragLineXFrac[id];
    if (typeof _linePreview !== 'undefined') delete _linePreview[id];
    const overlay = document.getElementById(`overlay-${id}`);
    if (overlay) {
      const ctx = overlay.getContext('2d');
      ctx.clearRect(0, 0, overlay.width, overlay.height);
    }
  }

  const _dragLineXFrac = {};
  const _prevLinePos = {};

  function drawLineOnOverlay(id, frac, orient) {
    orient = orient || 'vertical';
    const overlay = document.getElementById(`overlay-${id}`);
    if (!overlay) return;
    const ctx = overlay.getContext('2d');
    const w = overlay.width, h = overlay.height;
    if (!w || !h) return;

    // Erase old line
    const old = _prevLinePos[id];
    if (old !== undefined) {
      if (old.orient === 'horizontal') {
        ctx.clearRect(0, old.pos - 8, w, 16);
      } else {
        ctx.clearRect(old.pos - 8, 0, 16, h);
      }
    }

    const lp = frac * (orient === 'horizontal' ? h : w);
    _prevLinePos[id] = { pos: lp, orient };

    ctx.beginPath();
    if (orient === 'horizontal') {
      ctx.moveTo(0, lp);
      ctx.lineTo(w, lp);
    } else {
      ctx.moveTo(lp, 0);
      ctx.lineTo(lp, h);
    }
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(orient === 'horizontal' ? w / 2 : lp,
            orient === 'horizontal' ? lp : h / 2, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffff';
    ctx.fill();
    ctx.strokeStyle = '#0d1117';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Zoom / Pan ──

  const _zoomState = {};

  function initZoom(id) {
    if (!_zoomState[id]) _zoomState[id] = { zoom: 1, panX: 0, panY: 0 };
  }

  function applyZoom(id) {
    const vp = document.getElementById(`viewport-${id}`);
    if (!vp) return;
    const s = _zoomState[id];
    if (!s) return;
    vp.style.transform = `scale(${s.zoom}) translate(${s.panX}px, ${s.panY}px)`;
  }

  function zoomIn(id)  { initZoom(id); const s=_zoomState[id]; const wrap=document.getElementById(`wrap-${id}`); if(!wrap)return; const r=wrap.getBoundingClientRect(); const cx=r.width/2, cy=r.height/2; const z=Math.min(5,s.zoom*1.3); s.panX=s.panX+cx*(1/z-1/s.zoom); s.panY=s.panY+cy*(1/z-1/s.zoom); s.zoom=z; applyZoom(id); }
  function zoomOut(id) { initZoom(id); const s=_zoomState[id]; const wrap=document.getElementById(`wrap-${id}`); if(!wrap)return; const r=wrap.getBoundingClientRect(); const cx=r.width/2, cy=r.height/2; const z=Math.max(1,s.zoom/1.3); s.panX=s.panX+cx*(1/z-1/s.zoom); s.panY=s.panY+cy*(1/z-1/s.zoom); s.zoom=z; if(s.zoom<=1){s.panX=0;s.panY=0;} applyZoom(id); }
  function zoomReset(id) { _zoomState[id] = { zoom: 1, panX: 0, panY: 0 }; applyZoom(id); }

  // Wheel zoom — works in card and fullscreen (uses .cam-viewport)
  document.addEventListener('wheel', function (e) {
    const vp = e.target.closest('.cam-viewport');
    if (!vp) return;
    const idStr = vp.id.replace('viewport-', '');
    const id = parseInt(idStr);
    if (isNaN(id)) return;
    e.preventDefault();
    initZoom(id);
    const s = _zoomState[id];
    const rect = vp.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newZoom = Math.max(1, Math.min(5, s.zoom * factor));
    if (newZoom === s.zoom) return;
    s.panX = s.panX + mx * (1 / newZoom - 1 / s.zoom);
    s.panY = s.panY + my * (1 / newZoom - 1 / s.zoom);
    s.zoom = newZoom;
    if (s.zoom <= 1) { s.panX = 0; s.panY = 0; }
    applyZoom(id);
  }, { passive: false });

  // Left-click or middle-click drag pan
  const _panState = {};

  document.addEventListener('mousedown', function (e) {
    if (e.button !== 0 && e.button !== 1) return;
    const vp = e.target.closest('.cam-viewport');
    if (!vp) return;
    const idStr = vp.id.replace('viewport-', '');
    const id = parseInt(idStr);
    if (isNaN(id)) return;
    e.preventDefault();
    initZoom(id);
    _panState[id] = { startX: e.clientX, startY: e.clientY, panX: _zoomState[id].panX, panY: _zoomState[id].panY };
    const wrap = document.getElementById(`wrap-${id}`);
    if (wrap) wrap.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', function (e) {
    for (const idStr of Object.keys(_panState)) {
      const id = parseInt(idStr);
      const s = _panState[id];
      if (!s) continue;
      const vp = document.getElementById(`viewport-${id}`);
      if (!vp || !vp.isConnected) { delete _panState[id]; continue; }
      const dx = (e.clientX - s.startX) / _zoomState[id].zoom;
      const dy = (e.clientY - s.startY) / _zoomState[id].zoom;
      _zoomState[id].panX = s.panX + dx;
      _zoomState[id].panY = s.panY + dy;
      applyZoom(id);
    }
  });

  document.addEventListener('mouseup', function (e) {
    for (const idStr of Object.keys(_panState)) {
      const wrap = document.getElementById(`wrap-${idStr}`);
      if (wrap) wrap.style.cursor = '';
      delete _panState[idStr];
    }
  });

  // ── Shift+drag rubber-band selection zoom ──

  const _selState = {};

  document.addEventListener('mousedown', function (e) {
    if (!e.shiftKey || e.button !== 0) return;
    const vp = e.target.closest('.cam-viewport');
    if (!vp) return;
    const idStr = vp.id.replace('viewport-', '');
    const id = parseInt(idStr);
    if (isNaN(id)) return;
    const rect = vp.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const selDiv = document.getElementById(`sel-${id}`);
    if (!selDiv) return;
    _selState[id] = { x1: x, y1: y, x2: x, y2: y, id };
    selDiv.classList.add('active');
    selDiv.innerHTML = `<div class="sel-rect" style="left:${x}px;top:${y}px;width:0;height:0"></div>`;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    for (const idStr of Object.keys(_selState)) {
      const s = _selState[idStr];
      if (!s) continue;
      const vp = document.getElementById(`viewport-${s.id}`);
      if (!vp || !vp.isConnected) { delete _selState[idStr]; continue; }
      const rect = vp.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
      const y = Math.max(0, Math.min(rect.height, e.clientY - rect.top));
      s.x2 = x; s.y2 = y;
      const l = Math.min(s.x1, s.x2), t = Math.min(s.y1, s.y2);
      const w2 = Math.abs(s.x2 - s.x1), h2 = Math.abs(s.y2 - s.y1);
      const selDiv = document.getElementById(`sel-${s.id}`);
      if (selDiv) {
        selDiv.innerHTML = `<div class="sel-rect" style="left:${l}px;top:${t}px;width:${w2}px;height:${h2}px"></div>`;
      }
    }
  });

  document.addEventListener('mouseup', function (e) {
    for (const idStr of Object.keys(_selState)) {
      const s = _selState[idStr];
      if (!s) continue;
      const selDiv = document.getElementById(`sel-${s.id}`);
      if (selDiv) { selDiv.classList.remove('active'); selDiv.innerHTML = ''; }
      const w = Math.abs(s.x2 - s.x1);
      const h = Math.abs(s.y2 - s.y1);
      if (w > 10 && h > 10) {
        const vp = document.getElementById(`viewport-${s.id}`);
        if (!vp) { delete _selState[idStr]; continue; }
        const vpRect = vp.getBoundingClientRect();
        const fw = w / vpRect.width;
        const fh = h / vpRect.height;
        initZoom(s.id);
        const zs = _zoomState[s.id];
        const newZoom = Math.max(1, Math.min(5, zs.zoom / Math.max(fw, fh)));
        const leftPx = Math.min(s.x1, s.x2);
        const topPx  = Math.min(s.y1, s.y2);
        zs.panX = zs.panX - leftPx / zs.zoom;
        zs.panY = zs.panY - topPx / zs.zoom;
        zs.zoom = newZoom;
        if (zs.zoom <= 1) { zs.panX = 0; zs.panY = 0; }
        applyZoom(s.id);
      }
      delete _selState[idStr];
    }
  });

  // ── Fullscreen popup ──

  let _fsId = null;

  function fullscreenCam(id) {
    // Toggle off if already fullscreen for same camera
    if (_fsId === id) { closeFullscreen(); return; }
    // Close any existing fullscreen first
    if (_fsId !== null) closeFullscreen(true);

    const modal = document.createElement('div');
    modal.id = 'fs-modal';
    modal.className = 'fs-modal';
    modal.innerHTML = `<div class="fs-backdrop"></div>
      <div class="fs-content">
        <div class="fs-header">
          <span class="fs-label" id="fs-label">${escHtml(loadConfig()[id]?.label || `Camera ${id}`)}</span>
          <button class="cam-btn" onclick="closeFullscreen()" title="Close">✕</button>
        </div>
        <div class="fs-body" id="fs-body"></div>
      </div>`;
    document.body.appendChild(modal);

    // Move the viewport into the modal body
    const srcVp = document.getElementById(`viewport-${id}`);
    const dstBody = document.getElementById('fs-body');
    if (srcVp && dstBody) {
      srcVp._fsParent = srcVp.parentElement; // save restore point
      srcVp._fsNextSibling = srcVp.nextSibling;
      dstBody.appendChild(srcVp);
      // Re-apply zoom state
      const zs = _zoomState[id];
      if (zs) srcVp.style.transform = `scale(${zs.zoom}) translate(${zs.panX}px, ${zs.panY}px)`;
    }
    _fsId = id;
  }

  function closeFullscreen(silent) {
    const modal = document.getElementById('fs-modal');
    if (!modal) return;
    // Restore viewport to original place
    if (_fsId !== null) {
      const vp = document.getElementById(`viewport-${_fsId}`);
      if (vp && vp._fsParent) {
        if (vp._fsNextSibling) {
          vp._fsParent.insertBefore(vp, vp._fsNextSibling);
        } else {
          vp._fsParent.appendChild(vp);
        }
        delete vp._fsParent;
        delete vp._fsNextSibling;
      }
    }
    modal.remove();
    _fsId = null;
  }

  // Close fullscreen on Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('fs-modal')) closeFullscreen();
  });

  // ── Line settings modal ──

  let _lineModalId = null;
  const _linePreview = {};

  function linePreview() {
    const id = _lineModalId;
    if (id === null) return;
    _linePreview[id] = {
      pos: parseFloat(document.getElementById('line-pos').value),
      orient: document.getElementById('line-orient').value,
      dir: document.getElementById('line-dir').value,
    };
    drawLineOnOverlay(id, _linePreview[id].pos, _linePreview[id].orient);
  }

  function showLineModal(id) {
    _lineModalId = id;
    const cams = loadConfig();
    const cam = cams[id];
    if (!cam) return;
    document.getElementById('line-pos').value = cam.line_pos ?? cam.line_x ?? 0.5;
    document.getElementById('line-pos-val').textContent =
      Math.round((cam.line_pos ?? cam.line_x ?? 0.5) * 100) + '%';
    const orient = cam.line_orientation || 'vertical';
    document.getElementById('line-orient').value = orient;
    updateLineDirOptions(orient);
    document.getElementById('line-dir').value = cam.line_direction || 'forward';
    linePreview();
    document.getElementById('line-modal').classList.add('open');
  }

  function closeLineModal() {
    const id = _lineModalId;
    document.getElementById('line-modal').classList.remove('open');
    if (id !== null) delete _linePreview[id];
    _lineModalId = null;
    // Redraw with saved position
    const cams = loadConfig();
    const cam = cams[id];
    if (cam) drawLineOnOverlay(id, cam.line_pos ?? cam.line_x ?? 0.5, cam.line_orientation || 'vertical');
  }

  function updateLineDirOptions(orient) {
    const sel = document.getElementById('line-dir');
    if (orient === 'horizontal') {
      sel.options[0] = new Option('Top → Bottom', 'forward');
      sel.options[1] = new Option('Bottom → Top', 'backward');
    } else {
      sel.options[0] = new Option('Left → Right', 'forward');
      sel.options[1] = new Option('Right → Left', 'backward');
    }
  }

  function saveLineSettings() {
    const id = _lineModalId;
    if (id === null) return;
    const pos = parseFloat(document.getElementById('line-pos').value);
    const orient = document.getElementById('line-orient').value;
    const dir = document.getElementById('line-dir').value;
    const cams = loadConfig();
    if (!cams[id]) return;
    cams[id].line_pos = pos;
    cams[id].line_orientation = orient;
    cams[id].line_direction = dir;
    cams[id].line_x = pos; // backward compat
    saveConfig(cams);
    delete _linePreview[id];
    fetch(`/camera/${id}/line`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_x: pos, line_pos: pos, line_orientation: orient, line_direction: dir })
    }).catch(() => {});
    closeLineModal();
  }

  // Live preview on changes
  document.getElementById('line-pos').addEventListener('input', linePreview);
  document.getElementById('line-orient').addEventListener('change', function () {
    updateLineDirOptions(this.value);
    const sel = document.getElementById('line-dir');
    if (sel.options.length > 0) sel.selectedIndex = 0;
    linePreview();
  });

  // ── SSE live counts ──
  let sseInitialized = false;

  function buildCamCounts(id, classKeys) {
    const el = document.getElementById('counts-' + id);
    if (!el) return;
    el.innerHTML = classKeys.map(key => {
      const c = CLASS_COLORS[key] || DEFAULT_COLOR;
      return `<div class="count-item">
        <div class="dot" style="background:${c.dot}"></div>
        ${fmtLabel(key)}
        <span class="count-num" id="cls-${id}-${key}" style="color:${c.text}">0</span>
      </div>`;
    }).join('');
  }

  function buildFooter(classKeys) {
    const footer = document.getElementById('footer-totals');
    const items = classKeys.map(key => {
      const c = CLASS_COLORS[key] || DEFAULT_COLOR;
      return `<div class="divider"></div>
      <div class="total-item">
        <div class="dot" style="width:10px;height:10px;background:${c.dot}"></div>
        <div>
          <div class="total-num" id="total-${key}" style="color:${c.text}">0</div>
          <div class="total-name">${fmtLabel(key)}</div>
        </div>
      </div>`;
    }).join('');
    footer.innerHTML = '<span class="total-tag">All Cameras Total</span>' + items;
  }

  // ── SSE live counts ──
  const es = new EventSource('/counts');

  es.onmessage = function (e) {
    const data = JSON.parse(e.data);

    // Build count chips on demand (handles cameras added after render)
    let allClassKeys = [];
    for (const [id, cam] of Object.entries(data)) {
      const btn = document.getElementById('toggle-' + id);
      if (btn) applyRunningState(btn, cam.running);

      const countsEl = document.getElementById('counts-' + id);
      if (countsEl && !countsEl.hasChildNodes()) {
        const classKeys = Object.keys(cam).filter(k => k !== 'label' && k !== 'running');
        buildCamCounts(id, classKeys);
        allClassKeys = classKeys;
      }
    }

    // Build footer on first data
    if (!sseInitialized) {
      const firstCam = Object.values(data)[0] || {};
      const classKeys = Object.keys(firstCam).filter(k => k !== 'label' && k !== 'running');
      if (classKeys.length) buildFooter(classKeys);
      sseInitialized = true;
    }

    const totals = {};
    for (const [id, cam] of Object.entries(data)) {
      for (const [key, val] of Object.entries(cam)) {
        if (key === 'label' || key === 'running') continue;
        const el = document.getElementById(`cls-${id}-${key}`);
        if (el) el.textContent = val;
        totals[key] = (totals[key] || 0) + val;
      }
    }
    for (const [key, val] of Object.entries(totals)) {
      const el = document.getElementById('total-' + key);
      if (el) el.textContent = val;
    }
  };

  es.onerror = function () {};

  function applyRunningState(btn, running) {
    if (running) {
      btn.textContent = 'Stop';
      btn.classList.remove('btn-start');
      btn.classList.add('btn-stop');
    } else {
      btn.textContent = 'Start';
      btn.classList.remove('btn-stop');
      btn.classList.add('btn-start');
    }
  }

  function toggleCam(id, btn) {
    const cams = loadConfig();
    const cam = cams[id];
    const stopping = btn.textContent.trim() === 'Stop';

    if (stopping) {
      if (cam && cam.source === 'browser') {
        stopBrowserCam(id);
      } else {
        stopCanvasFeed(id);
      }
      fetch(`/stop/${id}`, { method: 'POST' })
        .then(r => r.json())
        .then(d => applyRunningState(btn, d.running));
    } else {
      if (cam && cam.source === 'browser') {
        startBrowserCam(id);
      } else {
        startCanvasFeed(id);
      }
      fetch(`/start/${id}`, { method: 'POST' })
        .then(r => r.json())
        .then(d => applyRunningState(btn, d.running));
    }
  }

  function resetCam(id, btn) {
    fetch(`/reset/${id}`, { method: 'POST' })
      .then(r => r.json())
      .then(() => {
        document.querySelectorAll(`#counts-${id} .count-num`)
          .forEach(el => el.textContent = '0');
        const totals = {};
        document.querySelectorAll('[id^="cls-"]').forEach(el => {
          const key = el.id.replace(/^cls-\d+-/, '');
          totals[key] = (totals[key] || 0) + parseInt(el.textContent || 0, 10);
        });
        for (const [key, val] of Object.entries(totals)) {
          const el = document.getElementById('total-' + key);
          if (el) el.textContent = val;
        }
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 600);
      });
  }

  // ── Browser Camera Management ──

  async function detectCameras() {
    try {
      const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
      tempStream.getTracks().forEach(t => t.stop());
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoDevices = devices.filter(d => d.kind === 'videoinput');
      const select = document.getElementById('cam-devices');
      select.innerHTML = '';
      if (videoDevices.length === 0) {
        select.innerHTML = '<option value="">No cameras found</option>';
        return;
      }
      videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Camera ${i + 1}`;
        select.appendChild(opt);
      });
    } catch (e) {
      alert('Camera access denied. Please allow camera permission in your browser.');
    }
  }

  const browserStreams = {};   // { camId: { stream, video, interval } }

  async function startBrowserCam(id) {
    const cams = loadConfig();
    const cam = cams[id];
    if (!cam || cam.source !== 'browser') return;
    if (browserStreams[id]) return; // already running

    try {
      let videoConstraint;
      if (cam.facingMode) {
        videoConstraint = { facingMode: cam.facingMode };
      } else {
        videoConstraint = { deviceId: { exact: cam.url } };
      }
      const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraint });

      const video = document.getElementById(`video-${id}`);
      if (!video) throw new Error('Video element not found');
      video.srcObject = stream;
      await video.play();
      video.addEventListener('playing', () => feedLoaded(id), { once: true });

      // Capture loop: send frames to server for YOLO (30 FPS)
      const interval = setInterval(() => {
        if (video.readyState < 2) return;
        const c = document.createElement('canvas');
        c.width = video.videoWidth;
        c.height = video.videoHeight;
        c.getContext('2d').drawImage(video, 0, 0);
        const base64 = c.toDataURL('image/jpeg', 0.6).split(',')[1];
        fetch(`/camera/${id}/frame`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ frame: base64 })
        }).catch(() => {});
        c.remove();
      }, 33); // ~30 FPS capture for YOLO

      // Start annotation overlay (5 FPS)
      startAnnotationOverlay(id);

      browserStreams[id] = { stream, video, interval };
    } catch (e) {
      console.error(`[Cam ${id}] Browser camera error:`, e);
    }
  }

  function stopBrowserCam(id) {
    const b = browserStreams[id];
    if (!b) return;
    clearInterval(b.interval);
    stopAnnotationOverlay(id);
    b.stream.getTracks().forEach(t => t.stop());
    b.video.srcObject = null;
    const wrap = document.getElementById(`wrap-${id}`);
    if (wrap) wrap.classList.remove('has-feed');
    delete browserStreams[id];
  }

  // Clean up on page unload
  window.addEventListener('beforeunload', function () {
    for (const id of Object.keys(canvasFeedControllers)) stopCanvasFeed(id);
    for (const id of Object.keys(annotationOverlays)) stopAnnotationOverlay(id);
    for (const id of Object.keys(browserStreams)) stopBrowserCam(id);
  });

  // ── Init ──
  document.addEventListener('DOMContentLoaded', function () {
    syncAndRender();
  });
</script>
