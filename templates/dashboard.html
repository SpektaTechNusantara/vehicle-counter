<title>Vehicle Counter — Mining Site</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #3fb950;
    box-shadow: 0 0 7px #3fb950;
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
  #clock {
    font-size: 0.85rem;
    color: #8b949e;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  /* ── Camera grid ── */
  main {
    flex: 1;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
    gap: 16px;
    align-content: start;
  }

  .cam-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
  }
  .cam-card:hover { border-color: #58a6ff; }

  .cam-feed-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0d1117;
    overflow: hidden;
  }
  .cam-feed {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  /* Spinner shown while feed loads */
  .cam-feed-wrap::before {
    content: "Connecting…";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8b949e;
    font-size: 0.85rem;
    pointer-events: none;
  }

  .cam-info {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid #30363d;
  }
  .cam-label {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .cam-counts {
    display: flex;
    gap: 20px;
  }
  .count-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: #8b949e;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ht  { background: #00e5ff; }
  .dot-ov  { background: #ff9800; }
  .count-num {
    font-weight: 700;
    font-size: 1rem;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
  }
  .num-ht  { color: #00e5ff; }
  .num-ov  { color: #ff9800; }

  /* ── Footer totals ── */
  footer {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .total-tag {
    font-size: 0.72rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .total-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .total-num {
    font-size: 1.6rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .total-ht  { color: #00e5ff; }
  .total-ov  { color: #ff9800; }
  .total-name {
    font-size: 0.75rem;
    color: #8b949e;
    margin-top: 2px;
  }
  .divider {
    width: 1px;
    height: 36px;
    background: #30363d;
    flex-shrink: 0;
  }
  .cam-actions {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .cam-btn {
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    border: 1px solid #30363d;
    color: #8b949e;
  }
  .cam-btn:hover { color: #e6edf3; border-color: #8b949e; }
  .cam-btn.flash { color: #3fb950; border-color: #3fb950; }
  .btn-stop  { border-color: #f8514950; color: #f85149; }
  .btn-stop:hover  { background: #f8514915; border-color: #f85149; }
  .btn-start { border-color: #3fb95060; color: #3fb950; }
  .btn-start:hover { background: #3fb95015; border-color: #3fb950; }
</style>

<header>
  <div class="logo">
    <div class="live-dot"></div>
    Mining Site Vehicle Counter
  </div>
  <div id="clock">--:--:--</div>
</header>

<main>
  {% for cam in cameras %}
  <div class="cam-card">
    <div class="cam-feed-wrap">
      <img class="cam-feed" src="/stream/{{ cam.id }}" alt="{{ cam.label }}">
    </div>
    <div class="cam-info">
      <span class="cam-label">{{ cam.label }}</span>
      <div class="cam-counts" id="counts-{{ cam.id }}">
        <!-- filled dynamically from SSE -->
      </div>
      <div class="cam-actions">
        <button class="cam-btn btn-start" id="toggle-{{ cam.id }}"
                onclick="toggleCam({{ cam.id }}, this)">Start</button>
        <button class="cam-btn" onclick="resetCam({{ cam.id }}, this)">Reset</button>
      </div>
    </div>
  </div>
  {% endfor %}
</main>

<footer id="footer-totals">
  <span class="total-tag">All Cameras Total</span>
  <!-- filled dynamically from SSE -->
</footer>

<script>
  // Live clock
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB');
    setTimeout(tick, 1000);
  })();

  // Color palette keyed by class name
  const CLASS_COLORS = {
    haul_truck:     { dot: '#00e5ff', text: '#00e5ff' },
    other_vehicles: { dot: '#ff9800', text: '#ff9800' },
  };
  const DEFAULT_COLOR = { dot: '#8b949e', text: '#e6edf3' };

  function fmtLabel(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // Build per-camera count chips from first SSE payload
  let initialized = false;

  function buildCamCounts(id, classKeys) {
    const el = document.getElementById('counts-' + id);
    if (!el) return;
    el.innerHTML = classKeys.map(key => {
      const c = CLASS_COLORS[key] || DEFAULT_COLOR;
      return `<div class="count-item">
        <div class="dot" style="background:${c.dot}"></div>
        ${fmtLabel(key)}
        <span class="count-num" id="cls-${id}-${key}" style="color:${c.text}">0</span>
      </div>`;
    }).join('');
  }

  function buildFooter(classKeys) {
    const footer = document.getElementById('footer-totals');
    const items = classKeys.map(key => {
      const c = CLASS_COLORS[key] || DEFAULT_COLOR;
      return `<div class="divider"></div>
      <div class="total-item">
        <div class="dot" style="width:10px;height:10px;background:${c.dot}"></div>
        <div>
          <div class="total-num" id="total-${key}" style="color:${c.text}">0</div>
          <div class="total-name">${fmtLabel(key)}</div>
        </div>
      </div>`;
    }).join('');
    footer.innerHTML = '<span class="total-tag">All Cameras Total</span>' + items;
  }

  // Live counts via Server-Sent Events
  const es = new EventSource('/counts');

  es.onmessage = function (e) {
    const data = JSON.parse(e.data);

    // On first message, build DOM structure from whatever classes the server sends
    if (!initialized) {
      const firstCam = Object.values(data)[0] || {};
      const classKeys = Object.keys(firstCam).filter(k => k !== 'label' && k !== 'running');
      for (const id of Object.keys(data)) buildCamCounts(id, classKeys);
      buildFooter(classKeys);
      initialized = true;
    }

    const totals = {};
    for (const [id, cam] of Object.entries(data)) {
      // Update stop/start button state
      const btn = document.getElementById('toggle-' + id);
      if (btn) applyRunningState(btn, cam.running);

      for (const [key, val] of Object.entries(cam)) {
        if (key === 'label' || key === 'running') continue;
        const el = document.getElementById(`cls-${id}-${key}`);
        if (el) el.textContent = val;
        totals[key] = (totals[key] || 0) + val;
      }
    }
    for (const [key, val] of Object.entries(totals)) {
      const el = document.getElementById('total-' + key);
      if (el) el.textContent = val;
    }
  };

  es.onerror = function () { /* browser auto-reconnects */ };

  function applyRunningState(btn, running) {
    if (running) {
      btn.textContent = 'Stop';
      btn.classList.remove('btn-start');
      btn.classList.add('btn-stop');
    } else {
      btn.textContent = 'Start';
      btn.classList.remove('btn-stop');
      btn.classList.add('btn-start');
    }
  }

  function toggleCam(id, btn) {
    const stopping = btn.textContent.trim() === 'Stop';
    const url = stopping ? `/stop/${id}` : `/start/${id}`;
    fetch(url, { method: 'POST' })
      .then(r => r.json())
      .then(data => applyRunningState(btn, data.running));
  }

  function resetCam(id, btn) {
    fetch(`/reset/${id}`, { method: 'POST' })
      .then(r => r.json())
      .then(() => {
        // Zero count elements immediately without waiting for next SSE tick
        document.querySelectorAll(`#counts-${id} .count-num`)
          .forEach(el => el.textContent = '0');
        // Recompute footer totals
        const totals = {};
        document.querySelectorAll('[id^="cls-"]').forEach(el => {
          const key = el.id.replace(/^cls-\d+-/, '');
          totals[key] = (totals[key] || 0) + parseInt(el.textContent || 0, 10);
        });
        for (const [key, val] of Object.entries(totals)) {
          const el = document.getElementById('total-' + key);
          if (el) el.textContent = val;
        }
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 600);
      });
  }
</script>
