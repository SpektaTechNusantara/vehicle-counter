version: "3.9"

services:
  vehicle-counter:
    build: .
    container_name: vehicle-counter
    ports:
      - "5000:5000"
    volumes:
      # Letakkan vcmodel1.onnx di direktori yang sama dengan docker-compose.yml
      - ./vcmodel1.onnx:/app/vcmodel1.onnx
      # Buat folder videos/ dan taruh file .mp4 di dalamnya
      - ./videos:/app/videos
      # Mount config (jika ingin modifikasi tanpa rebuild)
      - ./cameras.yaml:/app/cameras.yaml:ro
      - ./bytetrack.yaml:/app/bytetrack.yaml:ro
      # Mount source + templates agar cukup restart (tanpa build) saat update
      - ./server.py:/app/server.py
      - ./templates:/app/templates
    environment:
      - CONFIG=cameras.yaml
      - PORT=5000
    restart: unless-stopped
